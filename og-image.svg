<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Light paper background -->
  <rect width="1200" height="630" fill="#fafaf8"/>

  <!-- Subtle film grain -->
  <defs>
    <filter id="gn">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0.3 0.3 0.3 0 0  0.3 0.3 0.3 0 0  0.3 0.3 0.3 0 0  0 0 0 0.1 0"/>
    </filter>
  </defs>
  <rect width="1200" height="630" filter="url(#gn)" opacity="0.18"/>

  <!-- KODY — left side, scaled up from 100x100 base to 380x380 -->
  <g transform="translate(95 125)" shape-rendering="crispEdges">
    <g transform="scale(3.8)">
      <rect x="3"  y="6"  width="94" height="90" fill="#1d1d1d"/>
      <rect x="3"  y="3"  width="94" height="90" fill="#0f0f0f"/>
      <rect x="12" y="14" width="76" height="68" fill="#ecebe4"/>
      <!-- Solid block eyes -->
      <rect x="29" y="41" width="10" height="14" fill="#0a0a0a"/>
      <rect x="61" y="41" width="10" height="14" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- Typography on the right -->
  <g transform="translate(550 150)">
    <!-- Eyebrow label -->
    <text x="0" y="0"
          font-family="'Space Mono', ui-monospace, monospace"
          font-size="16" letter-spacing="6" fill="#6a6a6a">
      DIRECTIONAL POSTER EDITOR
    </text>

    <!-- Title -->
    <text x="0" y="130"
          font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif"
          font-weight="900" font-size="108" letter-spacing="-3" fill="#0a0a0a">
      KODY
    </text>
    <text x="0" y="250"
          font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif"
          font-weight="900" font-size="108" letter-spacing="-3" fill="#0a0a0a">
      TYPOGRAPHY
    </text>

    <!-- Rule -->
    <line x1="0" y1="300" x2="110" y2="300" stroke="#0a0a0a" stroke-width="2"/>

    <!-- Tagline -->
    <text x="0" y="340"
          font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif"
          font-weight="500" font-size="22" fill="#2a2a2a">
      マウスで方向を決めながら、キーを打つたびに文字が走る。
    </text>
    <text x="0" y="375"
          font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif"
          font-weight="500" font-size="22" fill="#2a2a2a">
      日本語と画像を混ぜ合わせる、実験的なポスター・エディタ。
    </text>

    <!-- English sub -->
    <text x="0" y="425"
          font-family="'Space Mono', ui-monospace, monospace"
          font-size="16" letter-spacing="2" fill="#555">
      Click. Aim. Type. Characters follow wherever your pointer leads.
    </text>
  </g>

  <!-- Studio signature -->
  <text x="95" y="590"
        font-family="'Space Mono', ui-monospace, monospace"
        font-size="14" letter-spacing="5" fill="#6a6a6a">
    — kinoshita studio · 2026
  </text>
  <text x="1105" y="590"
        text-anchor="end"
        font-family="'Space Mono', ui-monospace, monospace"
        font-size="14" letter-spacing="3" fill="#6a6a6a">
    kody_typography / app
  </text>
</svg>
