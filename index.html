<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ECHO TYPOGRAPHY — kinoshita studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Space Mono', ui-monospace, monospace;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    caret-color: transparent;
    cursor: none;
  }
  /* The carpet — one <div> per row, pre-formatted monospace.
     Rendered character-cheap: the browser draws 1 text run per row. */
  .echo-row {
    white-space: pre;
    font-variant-ligatures: none;
    font-kerning: none;
    letter-spacing: 0;
  }
  /* Focus ring suppression — we own the keyboard */
  *:focus { outline: none !important; }
</style>

<script type="importmap">
{
  "imports": {
    "react":            "https://esm.sh/react@18.3.1",
    "react-dom":        "https://esm.sh/react-dom@18.3.1?external=react",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
    "lucide-react":     "https://esm.sh/lucide-react@0.441.0?external=react"
  }
}
</script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-type="module" data-presets="react">
// ═══════════════════════════════════════════════════════════════════════════
// ECHO TYPOGRAPHY — subtractive typography, keyboard-driven.
//
// Philosophy:
//   The canvas starts FULL. You do not add, you carve.
//   Space is the medium. Every character you remove is an act of design.
//
// Hackable points (by intent):
//   · SOURCES       — the words that fill the grid (Enter cycles)
//   · fontSize      — initial and bounds (S / B)
//   · grain opacity — the single non-essential visual, tuned low
//   · exportSVG     — lossless vector output of the carved state
// ═══════════════════════════════════════════════════════════════════════════

import React, { useState, useEffect, useLayoutEffect, useRef, useCallback } from 'react';
import { createRoot } from 'react-dom/client';
import { Minus } from 'lucide-react';

const SOURCES = [
  'SILENCE',
  'ECHO',
  'VOID',
  'TYPOGRAPHY',
  'SUBTRACT',
  'RESONANCE',
  'NEGATIVE SPACE',
];

const SIZE_MIN  = 12;
const SIZE_MAX  = 200;
const SIZE_STEP = 4;

function App() {
  const [sourceIx, setSourceIx] = useState(0);
  const [fontSize, setFontSize] = useState(48);
  const [inverted, setInverted] = useState(false);
  const [cursor,   setCursor]   = useState({ r: 0, c: 0 });
  const [cell,     setCell]     = useState({ w: 0, h: 0 });
  const [view,     setView]     = useState({ w: 0, h: 0 });
  const [grid,     setGrid]     = useState([]);          // 2D [{ ch, hid }]
  const [toast,    setToast]    = useState('');
  const [helpOpen, setHelpOpen] = useState(true);        // full help panel on first load

  const measureRef = useRef(null);
  const source = SOURCES[sourceIx % SOURCES.length];
  const fg = inverted ? '#000000' : '#FFFFFF';
  const bg = inverted ? '#FFFFFF' : '#000000';

  // ── Measure one monospace cell (width = average of 10 Ms; height = line box)
  useLayoutEffect(() => {
    if (!measureRef.current) return;
    const el = measureRef.current;
    const read = () => {
      const r = el.getBoundingClientRect();
      if (r.width > 0 && r.height > 0) setCell({ w: r.width / 10, h: r.height });
    };
    read();
    // Refire when Space Mono finishes loading (metrics jump at that moment)
    const ro = new ResizeObserver(read);
    ro.observe(el);
    if (document.fonts?.ready) document.fonts.ready.then(read);
    return () => ro.disconnect();
  }, [fontSize]);

  // ── Track viewport
  useEffect(() => {
    const onResize = () => setView({ w: window.innerWidth, h: window.innerHeight });
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const cols = cell.w > 0 ? Math.max(1, Math.floor(view.w / cell.w)) : 0;
  const rows = cell.h > 0 ? Math.max(1, Math.floor(view.h / cell.h)) : 0;

  // ── Rebuild the grid when dims or source change.
  // Preserve the carving pattern (hidden cells) by (r,c) position.
  useEffect(() => {
    if (rows === 0 || cols === 0) return;
    setGrid(prev => {
      const next = new Array(rows);
      let k = 0;
      for (let r = 0; r < rows; r++) {
        const row = new Array(cols);
        for (let c = 0; c < cols; c++) {
          const old = prev[r]?.[c];
          row[c] = { ch: source[k % source.length], hid: old?.hid || false };
          k++;
        }
        next[r] = row;
      }
      return next;
    });
    setCursor(cur => ({
      r: Math.min(Math.max(0, cur.r), rows - 1),
      c: Math.min(Math.max(0, cur.c), cols - 1),
    }));
  }, [rows, cols, source]);

  // ── Export the current carved state as a vector-perfect SVG
  const exportSVG = useCallback(() => {
    if (!grid.length || !cell.w) return;
    const W = cols * cell.w, H = rows * cell.h;
    const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const lines = [];
    lines.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W.toFixed(2)} ${H.toFixed(2)}" width="${W.toFixed(2)}" height="${H.toFixed(2)}">`);
    lines.push(`<rect width="100%" height="100%" fill="${bg}"/>`);
    lines.push(`<g font-family="Space Mono, ui-monospace, monospace" font-weight="700" font-size="${fontSize}" fill="${fg}" xml:space="preserve">`);
    for (let r = 0; r < rows; r++) {
      const line = grid[r].map(c => c.hid ? ' ' : c.ch).join('');
      lines.push(`<text x="0" y="${((r + 0.82) * cell.h).toFixed(2)}">${esc(line)}</text>`);
    }
    lines.push(`</g></svg>`);
    const blob = new Blob([lines.join('\n')], { type: 'image/svg+xml' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `echo_${new Date().toISOString().replace(/[:.]/g,'-')}.svg`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 400);
    flash('EXPORTED · SVG');
  }, [grid, rows, cols, cell.w, cell.h, fg, bg, fontSize]);

  const flash = (msg) => {
    setToast(msg);
    clearTimeout(flash._t);
    flash._t = setTimeout(() => setToast(''), 1400);
  };

  // ── Keyboard: the only interface.
  useEffect(() => {
    const onKey = (e) => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;   // leave browser shortcuts alone
      const k = e.key.toLowerCase();

      // ? / Shift+/ → toggle help overlay (and bare Escape closes it)
      if (e.key === '?' || (e.shiftKey && e.key === '/')) {
        e.preventDefault();
        setHelpOpen(v => !v);
        return;
      }
      if (e.key === 'Escape' && helpOpen) {
        e.preventDefault();
        setHelpOpen(false);
        return;
      }

      const isHandled =
        k === 'h' || k === 'j' || k === 'k' || k === 'l' ||
        k === 's' || k === 'b' || k === 'i' || k === 'p' ||
        k === ' ' || e.key === 'Enter';
      if (!isHandled) return;
      e.preventDefault();

      // Any handled key dismisses the initial help overlay.
      if (helpOpen) setHelpOpen(false);

      if      (k === 'h') setCursor(c => ({ ...c, c: Math.max(0, c.c - 1) }));
      else if (k === 'l') setCursor(c => ({ ...c, c: Math.min(cols - 1, c.c + 1) }));
      else if (k === 'k') setCursor(c => ({ ...c, r: Math.max(0, c.r - 1) }));
      else if (k === 'j') setCursor(c => ({ ...c, r: Math.min(rows - 1, c.r + 1) }));
      else if (k === ' ') {
        // Subtract — toggle hidden state at cursor
        setGrid(g => {
          if (!g[cursor.r] || !g[cursor.r][cursor.c]) return g;
          const ng = g.slice();
          ng[cursor.r] = ng[cursor.r].slice();
          const cur = ng[cursor.r][cursor.c];
          ng[cursor.r][cursor.c] = { ...cur, hid: !cur.hid };
          return ng;
        });
      }
      else if (k === 's') setFontSize(f => Math.max(SIZE_MIN, f - SIZE_STEP));
      else if (k === 'b') setFontSize(f => Math.min(SIZE_MAX, f + SIZE_STEP));
      else if (k === 'i') setInverted(v => !v);
      else if (e.key === 'Enter') {
        // Enter: cycle source AND reset carving (fresh fill).
        setSourceIx(i => i + 1);
        setGrid(g => g.map(row => row.map(c => ({ ...c, hid: false }))));
        flash('FILLED');
      }
      else if (k === 'p') exportSVG();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [cursor, rows, cols, exportSVG, helpOpen]);

  // ── Derived render string (one row per line)
  const rowStrs = grid.map(row => row.map(c => c.hid ? ' ' : c.ch).join(''));

  return (
    <div
      style={{ background: bg, color: fg }}
      className="fixed inset-0 overflow-hidden select-none"
    >
      {/* Invisible measurement probe — defines cell.w / cell.h */}
      <div
        ref={measureRef}
        aria-hidden
        style={{
          position: 'absolute',
          visibility: 'hidden',
          whiteSpace: 'pre',
          fontFamily: "'Space Mono', ui-monospace, monospace",
          fontWeight: 700,
          fontSize: fontSize + 'px',
          lineHeight: 1,
          letterSpacing: 0,
        }}
      >MMMMMMMMMM</div>

      {/* The character carpet — the canvas itself */}
      <div
        style={{
          fontFamily: "'Space Mono', ui-monospace, monospace",
          fontWeight: 700,
          fontSize: fontSize + 'px',
          lineHeight: 1,
          letterSpacing: 0,
        }}
      >
        {rowStrs.map((s, r) => (
          <div key={r} className="echo-row">{s || ' '}</div>
        ))}
      </div>

      {/* Cursor — a single cell frame, blending against whatever it sits on */}
      {cell.w > 0 && (
        <div
          aria-hidden
          style={{
            position: 'absolute',
            left:   (cursor.c * cell.w) + 'px',
            top:    (cursor.r * cell.h) + 'px',
            width:  cell.w + 'px',
            height: cell.h + 'px',
            border: `1.5px solid ${fg}`,
            boxSizing: 'border-box',
            mixBlendMode: 'difference',
            pointerEvents: 'none',
            transition: 'left 60ms linear, top 60ms linear',
          }}
        />
      )}

      {/* Film grain — static SVG turbulence, desaturated, overlaid low. */}
      <svg
        className="fixed inset-0 pointer-events-none"
        style={{ width: '100%', height: '100%', opacity: 0.11, mixBlendMode: 'overlay' }}
        aria-hidden
      >
        <filter id="echoGrain">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
          <feColorMatrix values="0.3 0.3 0.3 0 0   0.3 0.3 0.3 0 0   0.3 0.3 0.3 0 0   0 0 0 1 0"/>
        </filter>
        <rect width="100%" height="100%" filter="url(#echoGrain)"/>
      </svg>

      {/* ── Edge UI — minimal text only, blended so it survives invert ── */}

      {/* Top-left · title band */}
      <div
        className="fixed top-3 left-4 flex items-center gap-2 text-[10px] tracking-[0.32em]"
        style={{
          color: fg,
          background: inverted ? 'rgba(255,255,255,0.72)' : 'rgba(0,0,0,0.55)',
          backdropFilter: 'blur(6px)',
          WebkitBackdropFilter: 'blur(6px)',
          border: `1px solid ${inverted ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.18)'}`,
          padding: '8px 12px',
          lineHeight: 1,
        }}
      >
        <Minus size={10} strokeWidth={2.25}/>
        <span>ECHO TYPOGRAPHY</span>
      </div>

      {/* Top-right · state readout band */}
      <div
        className="fixed top-3 right-4 text-[10px] tracking-[0.2em] text-right leading-[1.7]"
        style={{
          color: fg,
          background: inverted ? 'rgba(255,255,255,0.72)' : 'rgba(0,0,0,0.55)',
          backdropFilter: 'blur(6px)',
          WebkitBackdropFilter: 'blur(6px)',
          border: `1px solid ${inverted ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.18)'}`,
          padding: '8px 12px',
        }}
      >
        <div>SRC · {source}</div>
        <div>SIZE · {String(fontSize).padStart(3,'0')}</div>
        <div>GRID · {String(cols).padStart(3,'0')} × {String(rows).padStart(3,'0')}</div>
        <div>MODE · {inverted ? 'INVERTED' : 'STANDARD'}</div>
      </div>

      {/* Bottom-left · always-on control legend on a soft band */}
      <div
        className="fixed bottom-3 left-4 text-[10px] tracking-[0.2em] leading-[1]"
        style={{
          color: fg,
          background: inverted ? 'rgba(255,255,255,0.72)' : 'rgba(0,0,0,0.55)',
          backdropFilter: 'blur(6px)',
          WebkitBackdropFilter: 'blur(6px)',
          border: `1px solid ${inverted ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.18)'}`,
          padding: '8px 12px',
          display: 'inline-flex',
          alignItems: 'center',
          gap: '14px',
          whiteSpace: 'nowrap',
        }}
      >
        <span><b>H J K L</b> MOVE</span>
        <span>·</span>
        <span><b>SPACE</b> SUBTRACT</span>
        <span>·</span>
        <span><b>ENTER</b> FILL</span>
        <span>·</span>
        <span><b>S B</b> SIZE −+</span>
        <span>·</span>
        <span><b>I</b> INVERT</span>
        <span>·</span>
        <span><b>P</b> EXPORT</span>
        <span>·</span>
        <span><b>?</b> HELP</span>
      </div>

      {/* Bottom-right · cursor address band */}
      <div
        className="fixed bottom-3 right-4 text-[10px] tracking-[0.22em] text-right leading-[1.7]"
        style={{
          color: fg,
          background: inverted ? 'rgba(255,255,255,0.72)' : 'rgba(0,0,0,0.55)',
          backdropFilter: 'blur(6px)',
          WebkitBackdropFilter: 'blur(6px)',
          border: `1px solid ${inverted ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.18)'}`,
          padding: '8px 12px',
        }}
      >
        <div>CUR · {String(cursor.c).padStart(3,'0')} , {String(cursor.r).padStart(3,'0')}</div>
        <div>kinoshita studio</div>
      </div>

      {/* ── Help panel — centered, solid-backed, auto-dismissed on any handled key ── */}
      {helpOpen && (
        <div
          className="fixed inset-0 flex items-center justify-center pointer-events-none"
          style={{ zIndex: 20 }}
        >
          <div
            style={{
              background: bg,
              color: fg,
              border: `1px solid ${fg}`,
              fontFamily: "'Space Mono', ui-monospace, monospace",
              boxShadow: inverted ? '0 0 0 1px #fff, 0 20px 60px rgba(0,0,0,0.15)'
                                  : '0 0 0 1px #000, 0 20px 60px rgba(0,0,0,0.6)',
            }}
            className="px-10 py-8 min-w-[440px]"
          >
            <div className="text-[10px] tracking-[0.4em] opacity-70 mb-1">ECHO TYPOGRAPHY</div>
            <div className="text-[22px] tracking-[0.12em] font-bold mb-6">
              SUBTRACTIVE TYPOGRAPHY
            </div>
            <div className="text-[11px] tracking-[0.05em] leading-[1.7] opacity-80 mb-6">
              The canvas is already full. You don&apos;t type — you <em>carve</em>.<br/>
              Negative space is the medium.
            </div>

            <div className="grid grid-cols-[auto_1fr] gap-x-6 gap-y-1.5 text-[12px] tracking-[0.1em]">
              <div className="text-right font-bold">H J K L</div><div>move the cursor</div>
              <div className="text-right font-bold">SPACE</div>  <div>subtract / restore the cell</div>
              <div className="text-right font-bold">ENTER</div>  <div>fill · cycle source word</div>
              <div className="text-right font-bold">S &nbsp; B</div><div>shrink &middot; grow font</div>
              <div className="text-right font-bold">I</div>      <div>invert black / white</div>
              <div className="text-right font-bold">P</div>      <div>export as SVG</div>
              <div className="text-right font-bold">?</div>      <div>toggle this help</div>
            </div>

            <div className="text-[9px] tracking-[0.32em] opacity-50 mt-7 text-right">
              PRESS ANY KEY TO BEGIN &nbsp;·&nbsp; ESC TO CLOSE
            </div>
          </div>
        </div>
      )}

      {/* Flash toast (export / fill confirmation) — dead-center, brief */}
      {toast && (
        <div
          className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[11px] tracking-[0.35em] px-4 py-2"
          style={{
            color: fg,
            mixBlendMode: 'difference',
            border: `1px solid ${fg}`,
            background: 'transparent',
          }}
        >
          {toast}
        </div>
      )}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
